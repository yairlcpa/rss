<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#333">
  <link rel="manifest" crossorigin="use-credentials" href="manifest.json"/>
  <link rel="apple-touce-icon" href="./pics/logo192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">    
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./src/style.css">
  <script defer src="./src/main.js"></script>
  <title>Rss</title>
</head>
<body data-bs-theme="dark"> 
<div class="app bg-body-tertiary">

<!--- ELEMENTS -->
<section id="ELEMENTS" class="page">
  <div id="foo"></div>
</section>  

<!-- NEW ITEM TEMLATE --> 
<template id="new-item">
  <div id="new-item-~i~" class="d-flex flex-column px-2 m-2 border border-2 rounded-4 bg-body-secondary">
    <img id="ti-~i~" class="flex-center rounded rounded-5 py-2 d-none" src="~Img~" style="max-height:250px; max-width:100%;"/>
    <a href="~Link~" target="_blank">~Title~</a>
    <div class="d-flex justify-content-between">
      <small>~Date~</small>
      <small class="text-truncate">~Site~</small>
    </div>
    <div class="d-flex">
      <h6 class="w-80 ps-3 flex-grow-1" style="font-size:1.1rem">~Text~</h6>
      <img id="si-~i~" class="flex-center rounded rounded-5 py-2 w-20" src="~Img~"  />
    </div>
  </div>
</template>

<!-- PAGE AUTH -->
<section id="page-auth" class="pg page flex-column page-hide">
  <div class="flex-column flex-center h-100 w-100 gap-3">
    LOAD KEY FILE
    <input id="key-file" type="file" class="d-none" accept="text.txt" onchange="_ReadKeyFile(this)"/>
    <label id="key-file-label" for="key-file" class="bi bi-upload"></label>
  </div>`
</section>

<!-- PAGE MAIN -->
<section id="page-main" class="pg page flex-column">
  <!-- MAIN HEADER -->
  <div id="main-header" class="flex-center gap-3 p-3 py-3 px-2 border-2 border-bottom bg-body-tertiary">
    <i class="bi bi-list" title="תפריט" onclick="SideBar()"></i>
    <i class="bi bi-sun" title="תאורה" onclick="_ThemeToggle()"></i>
    <i class="bi bi-arrow-clockwise" title="עדכן" onclick="location.reload()"></i>
    <i class="bi bi-check-all" title="סמן כנקרא" onclick="_MarkRead()"></i>
    <div class="dropdown">
      <span onclick="_GetFromClick()" class="dropdown-btn pointer d-flex gap-1 border rounded-2 py-0 px-2 fs-6">
        זמן...<i class="bi bi-caret-down"></i>
      </span>
      <div class="dropdown-content flex-column border rounded-2 bg-body-tertiary"></div>
    </div>
  </div>
  <div class="d-flex flex-grow-1 overflow-hidden">
    <!-- SIDEBAR -->
    <div id="sidebar" class="page mask" onclick="SideBar(this.id)">
      <div class="sidebar flex-column bg-body-tertiary" onclick="event.stopPropagation()">
        <img src="./pics/logo.png" class="w-60 pt-2 align-self-center" alt="MyRss">
        <hr>
        <!-- <span class="d-flex px-3 pointer" onclick="_EditFeeds()">ערוך פידים</span> -->
        <span class="d-flex px-3 pointer" onclick="_EditFeeds()"><i class="bi bi-pencil px-2 fs-6"></i>ערוך פידים</span>
        <hr>
        <div id="rss-feeds" class="flex-column gap-1 pt-2 mx-4 flex-grow-1"></div>
      </div>
    </div>
    <!-- RSS BOX -->
    <div class="w-100 d-flex overflow-y-scroll mb-2">
      <div class="side-div flex-grow-1"></div>
      <div id="rss-box h-100"></div>
      <div class="side-div flex-grow-1"></div>
    </div>
  </div> 
</section>

<!-- EDIT FEEDS -->
<section id="page-feeds" class="pg page page-hide flex-column flex-center gap-3 ltr">
  <h3>Edit Feeds</h3>
  <textarea id="jsno-feeds" class="p-2 mx-2 text-bg-body" cols="80" rows="20" onkeyup="_UpdateJson()"></textarea>
  <div class="d-flex px-2 gap-5 w-100 justify-content-center">
    <button class="text-bg-secondary rounded-2 poiner" onclick="StartApp()">close</button>
    <button class="text-bg-success rounded-2 poiner" onclick="_PritifyJson()">pritify</button>
    <button id="save-feeds" class="text-bg-primary rounded-2 poiner" onclick="_SaveFeeds()">save</button>
    <span id="json-error" class="text-danger fs-bold d-none">Syntex Error</span>
  </div>
</section> 

</div>
</body>
</html>
